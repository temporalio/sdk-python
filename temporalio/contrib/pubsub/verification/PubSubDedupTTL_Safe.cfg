\* Safe pruning: prune only when publisher has no pending batch and is not flushing.
\* Should PASS NoDuplicates — confirms the TTL safety constraint.

SPECIFICATION SafeFairSpec

CONSTANTS
    MaxItemsPerPub = 2

INVARIANTS
    NoDuplicates
    OrderPreservedPerPublisher

PROPERTIES
    AllItemsDelivered

CHECK_DEADLOCK
    FALSE
